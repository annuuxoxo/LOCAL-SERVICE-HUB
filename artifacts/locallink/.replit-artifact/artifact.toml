kind = "mobile"
previewPath = "/"
title = "LocalLink - Local Services"
version = "1.0.0"
id = "artifacts/locallink"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 24767
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/locallink run dev"

[services.env]
PORT = "24767"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/locallink", "run", "build"]
run = ["pnpm", "--filter", "@workspace/locallink", "run", "serve"]
